name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Import check
        run: |
          python -c "import sys; print('python ok');"

      - name: Smoke run (optional)
        run: |
          if [ -f app/main.py ]; then python -m py_compile app/main.py; fi
          if [ -f main.py ]; then python -m py_compile main.py; fi
