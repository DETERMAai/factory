name: Deploy DETERMA

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # העתקת הקבצים - הוספתי rm כדי לנקות שאריות קודמות
      - name: Copy files to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/determa-orchestrator"

      - name: Execute Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/determa-orchestrator
            
            # וידוא שתיקיית sql קיימת לפני הרצת ה-DB
            if [ -f "sql/001_state_plane.sql" ]; then
              docker exec -i coolify-db psql -U postgres -d postgres < sql/001_state_plane.sql
            else
              echo "Warning: sql/001_state_plane.sql not found, skipping DB sync"
            fi

            docker build -t determa-orchestrator:latest .

            docker stop determa-orchestrator || true
            docker rm determa-orchestrator || true
            
            # שיניתי את הפורט החיצוני ל-8081 כדי למנוע התנגשות
            docker run -d \
              --name determa-orchestrator \
              -p 8081:8080 \
              --restart always \
              --env-file .env \
              determa-orchestrator:latest

            sleep 5
            docker ps | grep determa-orchestrator