name: Deploy DETERMA

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "=== Remote host info ==="
            hostname || true
            whoami || true
            date || true

            echo "=== Prepare deploy dir ==="
            mkdir -p /opt/determa-orchestrator
            cd /opt/determa-orchestrator
            pwd
            ls -la

            echo "=== Systemd status (if exists) ==="
            systemctl status determa-orchestrator --no-pager || true

            echo "=== Last 120 logs (if exists) ==="
            journalctl -u determa-orchestrator -n 120 --no-pager || true

            echo "=== Done ==="